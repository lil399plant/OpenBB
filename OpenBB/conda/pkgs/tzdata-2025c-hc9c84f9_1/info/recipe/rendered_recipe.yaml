recipe:
  schema_version: 1
  context:
    version: 2025c
  package:
    name: tzdata
    version: 2025c
  source:
  - url: https://data.iana.org/time-zones/releases/tzdata2025c.tar.gz
    sha256: 4aa79e4effee53fc4029ffe5f6ebe97937282ebcdf386d5d2da91ce84142f957
  - url: https://data.iana.org/time-zones/releases/tzcode2025c.tar.gz
    sha256: 697ebe6625444aef5080f58e49d03424bbb52e08bf483d3ddb5acf10cbd15740
    target_directory: tzcode
  build:
    number: 1
    string: hc9c84f9_1
    script:
      interpreter: bash
      env:
        target_platform: osx-64
      file: build.sh
    noarch: generic
  requirements:
    build:
    - macosx_deployment_target_osx-64 10.13.*
    - clang_osx-64 19.*
    - make
    ignore_run_exports:
      from_package:
      - macosx_deployment_target_osx-64
      - clang_osx-64
  tests:
  - script:
    - test -f "${PREFIX}/share/zoneinfo/leapseconds"
    - test -f "${PREFIX}/share/zoneinfo/leap-seconds.list"
    - test -f "${PREFIX}/share/zoneinfo/iso3166.tab"
    - test -f "${PREFIX}/share/zoneinfo/zone1970.tab"
    - test -f "${PREFIX}/share/zoneinfo/zone.tab"
    - test -f "${PREFIX}/share/zoneinfo/tzdata.zi"
    - |
      dirs="$(
        find "${PREFIX}" -mindepth 1 -maxdepth 2 \
        \! -path "${PREFIX}/share" \! -path "${PREFIX}/conda-meta*"
      )"
      test "${dirs}" = "${PREFIX}/share/zoneinfo"
    - |
      heads="$(
        find "${PREFIX}/share/zoneinfo" -type f \
          \! -name \*.zi \! -name \*.tab \! -name leapseconds \! -name leap-seconds.list \
          -exec sh -c 'head -c4 $1 && echo' sh {} \; \
          | uniq
      )"
      test "${heads}" = TZif
  about:
    homepage: https://www.iana.org/time-zones
    repository: https://github.com/eggert/tz
    documentation: https://data.iana.org/time-zones/tz-link.html
    license: LicenseRef-Public-Domain
    license_file:
    - LICENSE
    summary: The Time Zone Database (called tz, tzdb or zoneinfo) data
    description: "The Time Zone Database (called tz, tzdb or zoneinfo) contains code \n(the tzcode package) and data (this package) that represent the\nhistory of local time for many representative\nlocations around the globe.  It is updated periodically to reflect\nchanges made by political bodies to time zone boundaries, UTC offsets,\nand daylight-saving rules."
  extra:
    recipe-maintainers:
    - ocefpaf
    - mbargull
    - pganssle
    - h-vetinari
