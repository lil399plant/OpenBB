CI: azure
CONDA_BUILD_SYSROOT: /opt/conda-sdks/MacOSX11.0.sdk
MACOSX_DEPLOYMENT_TARGET: '11.0'
MACOSX_SDK_VERSION: '11.0'
build_platform: osx-64
build_type: release
bzip2: '1'
c_compiler: clang
c_compiler_version: '19'
c_stdlib: macosx_deployment_target
c_stdlib_version: '11.0'
channel_sources: conda-forge/label/python_rc,conda-forge
channel_targets: conda-forge main
cpu_optimization_target: nocona
cran_mirror: https://cran.r-project.org
cxx_compiler: clangxx
cxx_compiler_version: '19'
expat: '2'
extend_keys:
- ignore_version
- extend_keys
- pin_run_as_build
- ignore_build_only_deps
fortran_compiler: gfortran
freethreading: 'no'
ignore_build_only_deps:
- numpy
- python
is_python_min: 'no'
libffi: '3.5'
liblzma_devel: '5'
libsqlite: '3'
lua: '5'
macos_machine: arm64-apple-darwin20.0.0
ncurses: '6'
numpy: '1.16'
openssl: '3.5'
perl: 5.26.2
pin_run_as_build:
  python:
    max_pin: x.x
    min_pin: x.x
  r-base:
    max_pin: x.x
    min_pin: x.x
python: '3.13'
python_impl: cpython
r_base: '3.5'
readline: '8'
target_platform: osx-arm64
tk: '8.6'
zip_keys:
- - build_type
  - channel_targets
- - c_compiler_version
  - cxx_compiler_version
zlib: '1'
